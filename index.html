<!DOCTYPE html>
<html>
<body>
<script>
	const prefixes = ["Alpha", "Zen", "Ruby", "Pixel", "Captain","Luna", "Quantum", "Emerald", "Serenity", "Sushi","Mountain", "Phoenix", "Electric", "Songbird", "Tech","Silver", "Midnight", "Tango", "Cosmic", "Jazz","Velvet", "Neon", "Ghostly", "Ballet", "Delta","Echo", "Solar", "Whispering", "Pirate", "Harmony","Cyber", "Melody", "Quasar", "Crimson", "Enigma","Stardust", "Techno", "Lunar", "Rogue", "Dream"];

	const number = Math.floor(Math.random() * 999 + 1);
	
	const username =

		suffixes[Math.floor(Math.random() * suffixes.length)] +

	// Output plain text directly
	document.body.innerText = username;
</script>
